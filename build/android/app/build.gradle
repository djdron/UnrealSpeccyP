apply plugin: 'com.android.application'
android {
    buildFeatures {
        buildConfig = true
    }
    buildToolsVersion "37.0.0"
    compileSdk 37

    defaultConfig {
        applicationId "app.usp"

//        minSdkVersion 8
//        targetSdkVersion 10

        minSdkVersion 21
        targetSdkVersion 37
    }

    buildTypes {
        release {
            minifyEnabled false
        }
        debug {
            jniDebuggable true
        }
    }
    lint {
        checkReleaseBuilds = false
        abortOnError = false
    }
    namespace = 'app.usp'
    externalNativeBuild {
        cmake {
            path '../../cmake/CMakeLists.txt'
            version = '4.1.2'
        }
    }
    ndkVersion = '29.0.14206865'
}
